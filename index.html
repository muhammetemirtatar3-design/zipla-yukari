<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zıpla Yukarı</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: system-ui, sans-serif;
    }
    canvas {
      display: block;
      border-radius: 8px;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
      touch-action: none;
      -webkit-touch-callout: none;
      user-select: none;
      max-width: 100vw;
      max-height: 100dvh;
    }
    #ui {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: #eee;
      font-size: 18px;
      pointer-events: none;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
    }
    #help {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="ui">
    Yükseklik: <span id="score">0</span>
    &nbsp;|&nbsp; En iyi: <span id="best">0</span>
  </div>
  <div id="help">Turuncu: kırılır | Siyah: tuzak | Mor uçan: çarpma</div>
  <canvas id="game"></canvas>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');

    const W = 400;
    const H = 600;
    canvas.width = W;
    canvas.height = H;

    const GRAVITY = 0.16;
    const JUMP_FORCE = -6.8;
    const JUMP_BOOST_STEP = 0.14;
    const JUMP_BOOST_MAX = 2.2;
    const PLATFORM_GAP_MIN = 48;
    const PLATFORM_GAP_MAX = 78;
    const MOVE_SPEED = 3.1;
    const ACCEL = 0.14;
    const FRICTION = 0.88;
    const BALL_RADIUS = 14;

    const keys = { left: false, right: false };
    let gameState = 'playing';
    let countdownEnd = 0;
    let bestScore = parseInt(localStorage.getItem('bestScore') || '0', 10);
    let squash = 0;
    let screenShake = 0;
    let floatTexts = [];
    let particles = [];
    let audioCtx = null;
    const TRAP_CHANCE = 0.12;
    const FRAGILE_CHANCE = 0.26;
    let deathReason = 'fall';
    const TARGET_FRAME_MS = 1000 / 60;
    let lastFrameTime = 0;
    let jumpBoost = 0;

    const ball = {
      x: W / 2,
      y: H - 120,
      vx: 0,
      vy: 0,
      radius: BALL_RADIUS,
    };

    let cameraY = 0;
    let maxHeight = 0;
    let platforms = [];
    let hazards = [];
    let lastHazardSpawnAt = 0;
    let clouds = [];
    let stars = [];

    function initBackground() {
      clouds = [];
      for (let i = 0; i < 18; i++) {
        clouds.push({
          x: Math.random() * W,
          y: -Math.random() * 8000,
          w: 50 + Math.random() * 70,
          speed: 0.25 + Math.random() * 0.35,
          alpha: 0.35 + Math.random() * 0.4,
        });
      }
      stars = [];
      for (let i = 0; i < 120; i++) {
        stars.push({
          x: Math.random() * W,
          y: -200 - Math.random() * 10000,
          size: 0.8 + Math.random() * 2.2,
          twinkle: Math.random() * Math.PI * 2,
        });
      }
    }

    function drawCloud(cx, cy, w, alpha) {
      ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
      const h = w * 0.35;
      ctx.beginPath();
      ctx.ellipse(cx, cy, w * 0.5, h, 0, 0, Math.PI * 2);
      ctx.ellipse(cx - w * 0.3, cy + h * 0.2, w * 0.35, h * 0.85, 0, 0, Math.PI * 2);
      ctx.ellipse(cx + w * 0.32, cy + h * 0.15, w * 0.38, h * 0.9, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawBackground() {
      const altitude = Math.max(0, -cameraY);
      const t = Math.min(1, altitude / 3500);

      const grad = ctx.createLinearGradient(0, 0, 0, H);
      if (t < 0.35) {
        grad.addColorStop(0, '#ff9a56');
        grad.addColorStop(0.45, '#ff6b9d');
        grad.addColorStop(1, '#c44569');
      } else if (t < 0.7) {
        grad.addColorStop(0, '#6c5ce7');
        grad.addColorStop(0.5, '#a29bfe');
        grad.addColorStop(1, '#fd79a8');
      } else {
        grad.addColorStop(0, '#0c0c1e');
        grad.addColorStop(0.4, '#1a1a4e');
        grad.addColorStop(1, '#2d1b69');
      }
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      // Güneş / ay (yüksekliğe göre)
      const sunY = 70 + t * 40;
      const sunColor = t > 0.7 ? '#f5f3ce' : '#ffe066';
      const sunGlow = ctx.createRadialGradient(W - 70, sunY, 5, W - 70, sunY, 55);
      sunGlow.addColorStop(0, sunColor);
      sunGlow.addColorStop(0.4, t > 0.7 ? 'rgba(245,243,206,0.3)' : 'rgba(255,224,102,0.35)');
      sunGlow.addColorStop(1, 'rgba(255,224,102,0)');
      ctx.fillStyle = sunGlow;
      ctx.beginPath();
      ctx.arc(W - 70, sunY, 55, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = sunColor;
      ctx.beginPath();
      ctx.arc(W - 70, sunY, 22, 0, Math.PI * 2);
      ctx.fill();

      // Yıldızlar (yüksekte)
      if (t > 0.25) {
        const starAlpha = Math.min(1, (t - 0.25) / 0.45);
        for (const s of stars) {
          const sy = s.y - cameraY * 0.15;
          if (sy < -10 || sy > H + 10) continue;
          const flicker = 0.5 + 0.5 * Math.sin(Date.now() * 0.003 + s.twinkle);
          ctx.fillStyle = `rgba(255, 255, 255, ${starAlpha * flicker * 0.9})`;
          ctx.beginPath();
          ctx.arc(s.x, sy, s.size, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // Bulutlar (parallax)
      for (const c of clouds) {
        const cy = c.y - cameraY * c.speed;
        if (cy < -80 || cy > H + 80) continue;
        drawCloud(c.x, cy, c.w, c.alpha * (1 - t * 0.5));
      }

      // Hafif parıltı katmanı
      ctx.fillStyle = `rgba(255, 255, 255, ${0.03 + t * 0.02})`;
      ctx.fillRect(0, 0, W, H);
    }

    function rollPlatformType() {
      const r = Math.random();
      if (r < TRAP_CHANCE) return 'trap';
      if (r < TRAP_CHANCE + FRAGILE_CHANCE) return 'fragile';
      return 'normal';
    }

    function createPlatform(x, y, width = 70, type) {
      const platformType = type ?? rollPlatformType();
      return { x, y, width, height: 12, flash: 0, type: platformType, dead: false };
    }

    function spawnBreakParticles(platform) {
      for (let i = 0; i < 10; i++) {
        particles.push({
          x: platform.x + Math.random() * platform.width,
          y: platform.y + platform.height / 2,
          vx: (Math.random() - 0.5) * 5,
          vy: (Math.random() - 0.5) * 4 - 1,
          life: 1,
          size: 2 + Math.random() * 3,
        });
      }
    }

    function drawTrapSpikes(x, py, width, height) {
      ctx.fillStyle = '#d63031';
      const spikeW = 8;
      const count = Math.floor(width / spikeW);
      for (let i = 0; i < count; i++) {
        const sx = x + i * spikeW + spikeW / 2;
        ctx.beginPath();
        ctx.moveTo(sx - 4, py);
        ctx.lineTo(sx, py - 5);
        ctx.lineTo(sx + 4, py);
        ctx.closePath();
        ctx.fill();
      }
    }

    function drawPlatform(p, py) {
      const isFragile = p.type === 'fragile';
      const isTrap = p.type === 'trap';

      if (p.flash > 0.05) {
        ctx.fillStyle = `rgba(255, 255, 180, ${p.flash * 0.7})`;
        ctx.beginPath();
        ctx.roundRect(p.x - 2, py - 2, p.width + 4, p.height + 4, 6);
        ctx.fill();
      }

      if (isFragile) {
        ctx.fillStyle = '#e17055';
        ctx.beginPath();
        ctx.roundRect(p.x, py, p.width, p.height, 4);
        ctx.fill();
        ctx.fillStyle = '#fab1a0';
        ctx.fillRect(p.x, py, p.width, 4);

        ctx.strokeStyle = '#c0392b';
        ctx.lineWidth = 2;
        ctx.setLineDash([5, 4]);
        ctx.strokeRect(p.x + 1, py + 1, p.width - 2, p.height - 2);
        ctx.setLineDash([]);

        ctx.strokeStyle = 'rgba(192, 57, 43, 0.7)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(p.x + p.width * 0.2, py + 2);
        ctx.lineTo(p.x + p.width * 0.35, py + p.height - 2);
        ctx.moveTo(p.x + p.width * 0.55, py + 2);
        ctx.lineTo(p.x + p.width * 0.7, py + p.height - 2);
        ctx.moveTo(p.x + p.width * 0.85, py + 3);
        ctx.lineTo(p.x + p.width * 0.75, py + p.height - 1);
        ctx.stroke();

        ctx.fillStyle = '#fff';
        ctx.font = 'bold 11px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText('!', p.x + p.width / 2, py + p.height - 2);
        ctx.textAlign = 'left';
      } else if (isTrap) {
        ctx.fillStyle = '#2d3436';
        ctx.beginPath();
        ctx.roundRect(p.x, py, p.width, p.height, 4);
        ctx.fill();
        ctx.fillStyle = '#636e72';
        ctx.fillRect(p.x, py + p.height - 4, p.width, 4);
        drawTrapSpikes(p.x, py, p.width, p.height);
        ctx.strokeStyle = '#d63031';
        ctx.lineWidth = 2;
        ctx.strokeRect(p.x + 1, py + 1, p.width - 2, p.height - 2);
        ctx.fillStyle = '#ff7675';
        ctx.font = 'bold 13px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText('✕', p.x + p.width / 2, py + p.height - 1);
        ctx.textAlign = 'left';
      } else {
        ctx.fillStyle = '#4ecca3';
        ctx.beginPath();
        ctx.roundRect(p.x, py, p.width, p.height, 4);
        ctx.fill();
        ctx.fillStyle = '#3db892';
        ctx.fillRect(p.x, py + p.height - 3, p.width, 3);
      }
    }

    function nextPlatformGap() {
      return PLATFORM_GAP_MIN + Math.random() * (PLATFORM_GAP_MAX - PLATFORM_GAP_MIN);
    }

    function unlockAudio() {
      try {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
      } catch (_) {}
    }

    function playJumpSound() {
      try {
        unlockAudio();
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        const t = audioCtx.currentTime;
        osc.frequency.setValueAtTime(280, t);
        osc.frequency.exponentialRampToValueAtTime(480, t + 0.07);
        gain.gain.setValueAtTime(0.12, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
        osc.start(t);
        osc.stop(t + 0.1);
      } catch (_) {}
    }

    function addFloatText(x, y, text) {
      floatTexts.push({ x, y, text, life: 1 });
    }

    function getDeltaTime(timestamp) {
      if (!lastFrameTime) lastFrameTime = timestamp;
      const dt = Math.min((timestamp - lastFrameTime) / TARGET_FRAME_MS, 2.5);
      lastFrameTime = timestamp;
      return dt;
    }

    function updateEffects(dt) {
      squash *= Math.pow(0.82, dt);
      screenShake *= Math.pow(0.8, dt);
      for (const p of platforms) {
        if (p.flash > 0) p.flash *= Math.pow(0.88, dt);
      }
      for (const ft of floatTexts) {
        ft.y -= 1.5 * dt;
        ft.life -= 0.025 * dt;
      }
      floatTexts = floatTexts.filter((ft) => ft.life > 0);
      platforms = platforms.filter((p) => !p.dead);
      for (const pt of particles) {
        pt.x += pt.vx * dt;
        pt.y += pt.vy * dt;
        pt.vy += 0.15 * dt;
        pt.life -= 0.04 * dt;
      }
      particles = particles.filter((pt) => pt.life > 0);
    }

    function initPlatforms() {
      platforms = [];
      // Başlangıç zemini
      platforms.push(createPlatform(W / 2 - 60, H - 40, 120, 'normal'));
      // Yukarı doğru basamaklar
      let y = H - 40;
      for (let i = 0; i < 25; i++) {
        y -= nextPlatformGap();
        const x = 40 + Math.random() * (W - 120);
        const width = 55 + Math.random() * 45;
        const type = i < 8 ? 'normal' : undefined;
        platforms.push(createPlatform(x, y, width, type));
      }
    }

    function createHazard() {
      const fromLeft = Math.random() < 0.5;
      return {
        x: fromLeft ? -24 : W + 24,
        y: cameraY + 100 + Math.random() * (H - 200),
        vx: fromLeft ? 2.4 : -2.4,
        radius: 15,
        wingPhase: Math.random() * Math.PI * 2,
      };
    }

    function trySpawnHazard() {
      const height = Math.max(0, -cameraY);
      if (height < 400) return;
      const gap = 650 + Math.random() * 400;
      if (height - lastHazardSpawnAt < gap) return;
      if (Math.random() > 0.45) return;
      if (hazards.length >= 2) return;

      lastHazardSpawnAt = height;
      hazards.push(createHazard());
    }

    function updateHazards(dt) {
      for (const h of hazards) {
        h.x += h.vx * dt;
        h.wingPhase += 0.14 * dt;
      }
      hazards = hazards.filter((h) => {
        const sy = screenY(h.y);
        return h.x > -50 && h.x < W + 50 && sy > -60 && sy < H + 60;
      });
    }

    function checkHazardCollision() {
      const ballSy = screenY(ball.y);
      for (const h of hazards) {
        const hy = screenY(h.y);
        const dist = Math.hypot(ball.x - h.x, ballSy - hy);
        if (dist < ball.radius + h.radius) {
          screenShake = 14;
          deathReason = 'hazard';
          triggerGameOver();
          return true;
        }
      }
      return false;
    }

    function drawHazard(h) {
      const sy = screenY(h.y);
      const wing = Math.sin(h.wingPhase) * 5;

      ctx.fillStyle = 'rgba(108, 92, 231, 0.35)';
      ctx.beginPath();
      ctx.ellipse(h.x, sy, h.radius + 4, h.radius + 2, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#5f27cd';
      ctx.beginPath();
      ctx.ellipse(h.x, sy, h.radius, h.radius * 0.72, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#a29bfe';
      ctx.beginPath();
      ctx.ellipse(h.x - 13, sy - 1, 11, 5 + wing * 0.3, -0.5, 0, Math.PI * 2);
      ctx.ellipse(h.x + 13, sy - 1, 11, 5 + wing * 0.3, 0.5, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#d63031';
      ctx.beginPath();
      ctx.arc(h.x - 5, sy - 3, 2.5, 0, Math.PI * 2);
      ctx.arc(h.x + 5, sy - 3, 2.5, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(h.x - 7, sy + 4);
      ctx.lineTo(h.x - 2, sy + 6);
      ctx.moveTo(h.x + 7, sy + 4);
      ctx.lineTo(h.x + 2, sy + 6);
      ctx.stroke();
    }

    function generateMorePlatforms() {
      const targetY = cameraY - H - 200;
      let topY = Math.min(...platforms.map((p) => p.y));
      let guard = 0;
      while (topY > targetY && guard++ < 40) {
        const lastY = platforms[platforms.length - 1].y;
        const newY = lastY - nextPlatformGap();
        platforms.push(
          createPlatform(30 + Math.random() * (W - 100), newY, 50 + Math.random() * 50)
        );
        topY = newY;
        if (platforms.length > 80) platforms.shift();
      }
    }

    function screenY(worldY) {
      return worldY - cameraY;
    }

    function worldY(screenY) {
      return screenY + cameraY;
    }

    function handleInput(dt) {
      if (gameState !== 'playing') return;
      const target = keys.left ? -MOVE_SPEED : keys.right ? MOVE_SPEED : 0;
      if (target !== 0) {
        ball.vx += (target - ball.vx) * Math.min(ACCEL * dt, 1);
      } else {
        ball.vx *= Math.pow(FRICTION, dt);
      }
    }

    function updateBall(dt) {
      ball.vy += GRAVITY * dt;
      ball.x += ball.vx * dt;
      ball.y += ball.vy * dt;

      // Ekran kenarlarından geçiş
      if (ball.x < -ball.radius) ball.x = W + ball.radius;
      if (ball.x > W + ball.radius) ball.x = -ball.radius;

      // Basamak çarpışması (yukarıdan iniş)
      if (ball.vy > 0) {
        for (const p of platforms) {
          const py = screenY(p.y);
          const ballBottom = screenY(ball.y) + ball.radius;
          const ballTop = screenY(ball.y) - ball.radius;
          const prevBottom = ballBottom - ball.vy * dt;

          if (
            ball.x + ball.radius > p.x &&
            ball.x - ball.radius < p.x + p.width &&
            prevBottom <= py &&
            ballBottom >= py &&
            ballTop < py + p.height
          ) {
            if (p.type === 'trap') {
              p.flash = 1;
              screenShake = 14;
              deathReason = 'trap';
              triggerGameOver();
              return;
            }
            ball.y = worldY(py - ball.radius);
            ball.vy = JUMP_FORCE - jumpBoost;
            jumpBoost = Math.min(jumpBoost + JUMP_BOOST_STEP, JUMP_BOOST_MAX);
            squash = 1;
            screenShake = 5;
            p.flash = 1;
            playJumpSound();
            if (p.type === 'fragile') {
              p.dead = true;
              spawnBreakParticles(p);
            }
            break;
          }
        }
      }

      // Kamera: top ekranın üst yarısına çıkınca takip et
      const ballScreenY = screenY(ball.y);
      if (ballScreenY < H * 0.4) {
        const diff = H * 0.4 - ballScreenY;
        cameraY -= diff;
        ball.y = worldY(H * 0.4);
      }

      // Skor (yükseklik)
      const height = Math.floor(-cameraY / 10);
      if (height > maxHeight) {
        const gain = height - maxHeight;
        maxHeight = height;
        addFloatText(ball.x, screenY(ball.y) - 20, `+${gain}`);
      }
      scoreEl.textContent = maxHeight;

      generateMorePlatforms();
      trySpawnHazard();
      updateHazards(dt);
      if (checkHazardCollision()) return;

      // Düşme = oyun bitti
      if (screenY(ball.y) > H + 80) {
        triggerGameOver();
      }
    }

    function triggerGameOver(reason) {
      if (gameState !== 'playing') return;
      if (reason) deathReason = reason;
      if (maxHeight > bestScore) {
        bestScore = maxHeight;
        localStorage.setItem('bestScore', String(bestScore));
        bestEl.textContent = bestScore;
      }
      gameState = 'gameover';
      countdownEnd = performance.now() + 3000;
    }

    function startGame() {
      gameState = 'playing';
      lastFrameTime = 0;
      jumpBoost = 0;
      deathReason = 'fall';
      cameraY = 0;
      maxHeight = 0;
      squash = 0;
      screenShake = 0;
      floatTexts = [];
      particles = [];
      hazards = [];
      lastHazardSpawnAt = 0;
      ball.x = W / 2;
      ball.y = H - 120;
      ball.vx = 0;
      ball.vy = JUMP_FORCE * 0.5;
      initPlatforms();
      initBackground();
      scoreEl.textContent = '0';
    }

    function draw() {
      ctx.save();
      if (screenShake > 0.3) {
        ctx.translate(
          (Math.random() - 0.5) * screenShake,
          (Math.random() - 0.5) * screenShake
        );
      }

      drawBackground();

      // Basamaklar
      for (const p of platforms) {
        const py = screenY(p.y);
        if (py < -30 || py > H + 30) continue;
        drawPlatform(p, py);
      }

      // Uçan tehlikeler
      for (const h of hazards) {
        drawHazard(h);
      }

      // Kırılan parçacıklar
      for (const pt of particles) {
        const pty = screenY(pt.y);
        ctx.globalAlpha = pt.life;
        ctx.fillStyle = '#e17055';
        ctx.fillRect(pt.x, pty, pt.size, pt.size);
        ctx.globalAlpha = 1;
      }

      // Uçan skor yazıları
      for (const ft of floatTexts) {
        ctx.globalAlpha = ft.life;
        ctx.fillStyle = '#ffe066';
        ctx.font = 'bold 16px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText(ft.text, ft.x, ft.y);
        ctx.globalAlpha = 1;
        ctx.textAlign = 'left';
      }

      // Top (squash)
      const by = screenY(ball.y);
      const scaleY = 1 + squash * 0.3;
      const scaleX = 1 - squash * 0.18;
      ctx.save();
      ctx.translate(ball.x, by);
      ctx.scale(scaleX, scaleY);
      const ballGrad = ctx.createRadialGradient(-4, -4, 2, 0, 0, ball.radius);
      ballGrad.addColorStop(0, '#ff6b6b');
      ballGrad.addColorStop(1, '#c0392b');
      ctx.fillStyle = ballGrad;
      ctx.beginPath();
      ctx.arc(0, 0, ball.radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.beginPath();
      ctx.arc(-5, -5, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      ctx.restore();

      // Game over katmanı
      if (gameState === 'gameover') {
        const left = Math.max(0, (countdownEnd - performance.now()) / 1000);
        ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
        ctx.fillRect(0, 0, W, H);
        ctx.textAlign = 'center';
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 32px system-ui';
        const titles = { trap: 'Tuzak!', hazard: 'Çarptın!', fall: 'Düştün!' };
        const subs = {
          trap: 'Tuzaklı basamağa bastın',
          hazard: 'Uçan nesneye çarptın',
          fall: '',
        };
        ctx.fillText(titles[deathReason] || 'Düştün!', W / 2, H / 2 - 55);
        if (subs[deathReason]) {
          ctx.font = '15px system-ui';
          ctx.fillStyle = deathReason === 'hazard' ? '#a29bfe' : '#ff7675';
          ctx.fillText(subs[deathReason], W / 2, H / 2 - 28);
          ctx.fillStyle = '#fff';
        }
        ctx.font = '20px system-ui';
        ctx.fillText(`Skorun: ${maxHeight}`, W / 2, H / 2 - 10);
        ctx.fillText(`En iyi: ${bestScore}`, W / 2, H / 2 + 25);
        if (left > 0) {
          ctx.font = 'bold 36px system-ui';
          ctx.fillStyle = '#ffe066';
          ctx.fillText(Math.ceil(left), W / 2, H / 2 + 85);
          ctx.font = '14px system-ui';
          ctx.fillStyle = 'rgba(255,255,255,0.7)';
          ctx.fillText('Boşluk veya dokun = hemen başla', W / 2, H / 2 + 120);
        }
        ctx.textAlign = 'left';
      }
    }

    function gameLoop(timestamp) {
      const dt = getDeltaTime(timestamp);
      if (gameState === 'playing') {
        handleInput(dt);
        updateBall(dt);
        updateEffects(dt);
      } else if (gameState === 'gameover') {
        updateEffects(dt);
        if (performance.now() >= countdownEnd) {
          startGame();
        }
      }
      draw();
      requestAnimationFrame(gameLoop);
    }

    function resizeCanvas() {
      const aspect = W / H;
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      if (vw / vh > aspect) {
        canvas.style.height = '100dvh';
        canvas.style.width = 'auto';
      } else {
        canvas.style.width = '100vw';
        canvas.style.height = 'auto';
      }
    }

    function trySkipCountdown() {
      if (gameState === 'gameover') startGame();
    }

    function handleTouch(e) {
      unlockAudio();
      if (gameState === 'gameover') {
        trySkipCountdown();
        return;
      }
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      keys.left = false;
      keys.right = false;
      for (let i = 0; i < e.touches.length; i++) {
        const x = ((e.touches[i].clientX - rect.left) / rect.width) * W;
        if (x < W / 2) keys.left = true;
        else keys.right = true;
      }
    }

    function clearTouch() {
      keys.left = false;
      keys.right = false;
    }

    document.addEventListener('keydown', (e) => {
      unlockAudio();
      if (e.code === 'Space' || e.code === 'Enter') {
        trySkipCountdown();
        return;
      }
      if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
      if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
    });

    document.addEventListener('keyup', (e) => {
      if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
      if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
    });

    canvas.addEventListener('touchstart', handleTouch, { passive: false });
    canvas.addEventListener('touchmove', handleTouch, { passive: false });
    canvas.addEventListener('touchend', clearTouch);
    canvas.addEventListener('touchcancel', clearTouch);
    canvas.addEventListener('click', () => {
      unlockAudio();
      trySkipCountdown();
    });

    bestEl.textContent = bestScore;
    initPlatforms();
    initBackground();
    ball.vy = JUMP_FORCE * 0.6;
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
